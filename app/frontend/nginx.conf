# Serves the static page and proxies /api to the API Service by its
# in-cluster DNS name. Doing the routing here keeps the demo free of an
# ingress controller dependency; swapping to Ingress + ALB is a listed
# extension in the README.
server {
    listen 8080;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    location /api {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
