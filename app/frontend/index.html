<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tasks — k8s-devops-capstone</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: ui-monospace, "Cascadia Code", "SF Mono", Menlo, monospace;
      max-width: 640px; margin: 3rem auto; padding: 0 1rem; line-height: 1.6;
    }
    h1 { font-size: 1.3rem; }
    h1 span { opacity: 0.5; }
    form { display: flex; gap: 0.5rem; margin: 1.5rem 0; }
    input[type="text"] {
      flex: 1; padding: 0.5rem 0.75rem; font: inherit;
      border: 1px solid #8884; border-radius: 6px; background: transparent; color: inherit;
    }
    button {
      padding: 0.5rem 1rem; font: inherit; cursor: pointer;
      border: 1px solid #8886; border-radius: 6px; background: transparent; color: inherit;
    }
    ul { list-style: none; padding: 0; }
    li { padding: 0.4rem 0; border-bottom: 1px solid #8883; }
    #status { font-size: 0.85rem; opacity: 0.6; }
  </style>
</head>
<body>
  <h1>tasks <span>// frontend → api → postgres, all on k8s</span></h1>
  <p id="status">connecting…</p>
  <form id="task-form">
    <input type="text" id="task-title" placeholder="Add a task" required maxlength="200" />
    <button type="submit">Add</button>
  </form>
  <ul id="task-list"></ul>

  <script>
    const list = document.getElementById("task-list");
    const status = document.getElementById("status");
    const form = document.getElementById("task-form");
    const input = document.getElementById("task-title");

    async function refresh() {
      try {
        const resp = await fetch("/api/tasks");
        if (!resp.ok) throw new Error(resp.status);
        const tasks = await resp.json();
        list.replaceChildren(...tasks.map(t => {
          const li = document.createElement("li");
          li.textContent = (t.done ? "[x] " : "[ ] ") + t.title;
          return li;
        }));
        status.textContent = `api ok — ${tasks.length} task(s)`;
      } catch (err) {
        status.textContent = "api unreachable: " + err.message;
      }
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const title = input.value.trim();
      if (!title) return;
      await fetch("/api/tasks", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title }),
      });
      input.value = "";
      refresh();
    });

    refresh();
  </script>
</body>
</html>
