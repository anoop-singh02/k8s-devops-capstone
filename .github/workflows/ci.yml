name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/api/requirements*.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: pytest -v

  build-and-scan:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        image: [api, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t capstone-${{ matrix.image }}:${{ github.sha }} app/${{ matrix.image }}
      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: capstone-${{ matrix.image }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

  validate-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Kustomize build both overlays
        run: |
          # prod overlay needs its secret env files to exist; CI uses
          # the committed examples since it only checks the build.
          cp k8s/overlays/prod/secret.env.example k8s/overlays/prod/secret.env
          cp k8s/overlays/prod/secret-api.env.example k8s/overlays/prod/secret-api.env
          kubectl kustomize k8s/overlays/local > /dev/null
          kubectl kustomize k8s/overlays/prod > /dev/null
      - name: Terraform fmt + validate
        uses: hashicorp/setup-terraform@v3
      - run: terraform -chdir=infrastructure fmt -check -recursive
      - run: terraform -chdir=infrastructure init -backend=false
      - run: terraform -chdir=infrastructure validate
