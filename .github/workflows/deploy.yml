# Manual-trigger deploy: the EKS cluster is a demo stack that only
# exists while being shown off, so deploys are a deliberate act rather
# than on every merge. Requires the cluster to be up (terraform apply)
# and AWS_DEPLOY_ROLE_ARN + AWS_REGION set as repo secrets/vars.
name: Deploy to EKS

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # OIDC token for assuming the AWS deploy role

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ca-central-1' }}
  CLUSTER_NAME: k8s-devops-capstone

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push images
        run: |
          for image in api frontend; do
            ref="${{ steps.ecr.outputs.registry }}/capstone-${image}:${{ github.sha }}"
            docker build -t "$ref" "app/${image}"
            docker push "$ref"
          done

      - name: Deploy with kustomize
        run: |
          aws eks update-kubeconfig --region "$AWS_REGION" --name "$CLUSTER_NAME"
          cd k8s/overlays/prod
          # Secrets come from GitHub secrets at deploy time — the .env
          # files themselves are never committed.
          printf '%s\n' \
            "POSTGRES_USER=app" \
            "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" \
            "POSTGRES_DB=tasks" > secret.env
          printf '%s\n' \
            "DATABASE_URL=postgresql://app:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/tasks" > secret-api.env
          kustomize edit set image \
            "capstone-api=${{ steps.ecr.outputs.registry }}/capstone-api:${{ github.sha }}" \
            "capstone-frontend=${{ steps.ecr.outputs.registry }}/capstone-frontend:${{ github.sha }}"
          kubectl apply -k .
          kubectl -n capstone rollout status deployment/api --timeout=180s
          kubectl -n capstone rollout status deployment/frontend --timeout=180s
