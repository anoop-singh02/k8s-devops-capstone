# NodePort 30080 pairs with the extraPortMappings entry in
# kind/cluster.yaml so the app is reachable at http://localhost:8080.
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: capstone
spec:
  type: NodePort
  ports:
    - port: 8080
      targetPort: http
      nodePort: 30080
